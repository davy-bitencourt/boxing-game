<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Porradaria Franca</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="lobby">
    <h1>PORRADARIA FRANCA</h1>
    <input id="nameInput" type="text" maxlength="16" placeholder="seu nome" autocomplete="off" />
    <div id="lobbyError"></div>
    <button id="joinBtn">entrar</button>
  </div>

  <div id="gameWrap">
    <canvas id="canvas" width="1080" height="720"></canvas>
  </div>

  <div id="deathScreen" style="display:none;flex-direction:column;align-items:center;justify-content:center;">
    <h2>Morreu</h2>
    <button onclick="location.reload()">jogar de novo</button>
  </div>

  <script>
    const FIST_REACH  = 38;
    const FIST_OFFSET = 14;
    const PUSH_REACH  = 30;
    let PLAYER_RADIUS = 18;
    let FIST_RADIUS   = 8;

    let ws        = null;
    let myId      = null;
    let gameState = [];

    const keys = { up: false, down: false, left: false, right: false };

    const punchKeys = { left: false, right: false };

    const keyMap = { ArrowUp: "up", ArrowDown: "down", ArrowLeft: "left", ArrowRight: "right" };
    document.addEventListener("keydown", e => {
      if (keyMap[e.key]) { keys[keyMap[e.key]] = true; e.preventDefault(); }
      if (e.key === ",") { punchKeys.left = true; e.preventDefault(); }
      if (e.key === ".") { punchKeys.right = true; e.preventDefault(); }
    });

    document.addEventListener("keyup", e => {
      if (keyMap[e.key]) keys[keyMap[e.key]] = false;
      if (e.key === ",") punchKeys.left = false;
      if (e.key === ".") punchKeys.right = false;
    });

    const canvas = document.getElementById("canvas");
    const ctx    = canvas.getContext("2d");

    window.addEventListener("blur", () => {
      punchKeys.left  = false;
      punchKeys.right = false;
    });

    setInterval(() => {
      if (!ws || ws.readyState !== WebSocket.OPEN || myId === null) return;

      const punchLeft  = punchKeys.left;
      const punchRight = punchKeys.right;

      ws.send(JSON.stringify({ type: "input", keys: { ...keys }, punchLeft, punchRight }));
    }, 33);

    function fistPos(p, side) {
      const sign = side === "left" ? -1 : 1;
      const lat  = p.angle + Math.PI / 2;
      const ext  = (side === "left" ? p.leftPunch : p.rightPunch) ? FIST_REACH : FIST_REACH * 0.5;
      return {
        x: p.x + Math.cos(p.angle) * ext + Math.cos(lat) * FIST_OFFSET * sign,
        y: p.y + Math.sin(p.angle) * ext + Math.sin(lat) * FIST_OFFSET * sign,
      };
    }

    function drawPlayer(p) {
      const isMe = p.id === myId;
      const r    = PLAYER_RADIUS;
      const fr   = FIST_RADIUS;
      const sx   = p.x;
      const sy   = p.y;
      if (p.pushing) {
        const pushFr = fr * 1.4;
        const lat = p.angle + Math.PI / 2;
        for (const sign of [-1, 1]) {
          const px = p.x + Math.cos(p.angle) * PUSH_REACH + Math.cos(lat) * 10 * sign;
          const py = p.y + Math.sin(p.angle) * PUSH_REACH + Math.sin(lat) * 10 * sign;
          ctx.fillStyle = "#ff3b3b";
          ctx.beginPath();
          ctx.arc(px, py, pushFr, 0, Math.PI * 2);
          ctx.fill();
        }
      } else {
        for (const side of ["left", "right"]) {
          const fp       = fistPos(p, side);
          const punching = side === "left" ? p.leftPunch : p.rightPunch;
          ctx.fillStyle  = punching ? "#ff3b3b" : "#8a1f1f";
          ctx.beginPath();
          ctx.arc(fp.x, fp.y, fr, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(sx, sy, r, 0, Math.PI * 2);
      ctx.fill();

      const bw   = 36, bh = 3;
      const bx   = sx - bw / 2;
      const by   = sy - r - 10;
      const frac = Math.max(0, p.hp / 100);
      ctx.fillStyle = "#1a1a1a";
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = "#eee";
      ctx.fillRect(bx, by, bw * frac, bh);

      ctx.fillStyle = isMe ? "#fff" : "#666";
      ctx.font      = "9px monospace";
      ctx.textAlign = "center";
      ctx.fillText(p.name, sx, by - 3);
    }

    function drawRing(ring) {
      ctx.fillStyle = "#3b0a0a";
      ctx.fillRect(ring.x, ring.y, ring.size, ring.size);
    }

    let ring = { x: 0, y: 0, size: 0 };

    function render() {
      ctx.fillStyle = "#050505";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawRing(ring);

      gameState.forEach(drawPlayer);
      requestAnimationFrame(render);
    }

    function doJoin() {
      const name  = document.getElementById("nameInput").value.trim();
      const errEl = document.getElementById("lobbyError");
      if (!name) { errEl.textContent = "coloque um nome"; return; }
      errEl.textContent = "";

      ws = new WebSocket(`ws://${location.host}`);

      ws.addEventListener("open", () => {
        ws.send(JSON.stringify({ type: "join", name }));
      });

      ws.addEventListener("message", e => {
        const msg = JSON.parse(e.data);

        if (msg.type === "error") { errEl.textContent = msg.msg; ws.close(); return; }

        if (msg.type === "welcome") {
          myId          = msg.id;
          PLAYER_RADIUS = msg.playerRadius;
          FIST_RADIUS   = msg.fistRadius;
          if (msg.ring) ring = msg.ring;
          canvas.width  = msg.worldW;
          canvas.height = msg.worldH;
          document.getElementById("lobby").style.display    = "none";
          document.getElementById("gameWrap").style.display = "flex";
          render();
        }

        if (msg.type === "state")    gameState = msg.players;
        if (msg.type === "you_died") document.getElementById("deathScreen").style.display = "flex";
      });

      ws.addEventListener("close", () => {
        if (myId !== null) document.getElementById("deathScreen").style.display = "flex";
      });

      ws.addEventListener("error", () => {
        errEl.textContent = "não foi possível conectar. servidor está rodando?";
      });
    }

    document.getElementById("joinBtn").addEventListener("click", doJoin);
    document.getElementById("nameInput").addEventListener("keydown", e => {
      if (e.key === "Enter") doJoin();
    });
  </script>
</body>
</html>
